services:
  - type: web
    name: aviation-intelligence-api
    env: python
    rootDir: backend
    buildCommand: python -m pip install --upgrade pip && pip install --prefer-binary -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
